name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

# Note : Vercel deploy preview est notre check de référence pour le build.
# Cette CI GitHub Actions valide juste l'install de deps + lint (non-bloquant).

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund
        continue-on-error: true

      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: All good
        run: echo "✅ Validation pipeline complete (Vercel handles the real build)"
